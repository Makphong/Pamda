{% extends "base.html" %}
{% block content %}
<section class="manage">
  <div class="manage__head">
    <h1 class="manage__title">เพิ่มโน้ต</h1>
    <a class="btn btn--ghost" href="{{ url_for('index') }}">Back</a>
  </div>

  <div class="manage__grid">
    <div class="card card--full">
      <div class="card__title">รายละเอียดโน้ต</div>

      <form method="post" action="{{ url_for('tools_bulk_note_submit') }}" class="stack">
        <label class="muted">โน้ต</label>
        <textarea class="input" name="content" rows="5" placeholder=""></textarea>

        <div class="row">
          <div class="stack" style="min-width: 220px;">
            <label class="muted">วันเริ่ม</label>
            <input class="input" type="date" name="start_day" value="{{ today }}" required>
          </div>

          <div class="stack" style="min-width: 220px;">
            <label class="muted">วันสิ้นสุด</label>
            <input class="input" type="date" name="end_day" placeholder="optional">
          </div>
        </div>

        <div class="row">
          <div class="stack" style="min-width: 260px;">
            <label class="muted">Project</label>
            <select class="select" name="target_project">
              <option value="all">ทั้งหมด</option>
              {% for p in projects %}
                <option value="{{ p.id }}">{{ p.name }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="stack" style="min-width: 260px;">
            <label class="muted">รูปแบบการแสดง</label>
            <div class="row">
              <label class="check">
                <input type="radio" name="mode" value="border" checked>
                <span>กรอบ</span>
              </label>
              <label class="check">
                <input type="radio" name="mode" value="fill">
                <span>เทสี</span>
              </label>
            </div>
          </div>

          <div class="stack" style="min-width: 180px;">
            <label class="muted">สี</label>
            <input class="input" type="color" name="color" value="#ea9999">
          </div>
        </div>

        <div class="row">
          <button class="btn btn--primary" type="submit">Add</button>
          <a class="btn btn--ghost" href="{{ url_for('index') }}">Cancel</a>
        </div>

      
      </form>
    </div>

    <div class="card card--full">
      <div class="card__title">เคลียร์โน้ต</div>

      <form method="post" action="{{ url_for('tools_bulk_clear_submit') }}" class="stack">
        <div class="row">
          <div class="stack" style="min-width: 220px;">
            <label class="muted">วันเริ่ม</label>
            <input class="input" type="date" name="start_day" value="{{ today }}" required>
          </div>

          <div class="stack" style="min-width: 220px;">
            <label class="muted">วันสิ้นสุด</label>
            <input class="input" type="date" name="end_day" placeholder="optional">
          </div>

          <div class="stack" style="min-width: 260px;">
            <label class="muted">Project</label>
            <select class="select" name="target_project">
              <option value="all">ทั้งหมด</option>
              {% for p in projects %}
                <option value="{{ p.id }}">{{ p.name }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="row">
          <button class="btn btn--danger" type="submit">Clear</button>
          <a class="btn btn--ghost" href="{{ url_for('index') }}">Cancel</a>
        </div>

        
      </form>
    </div>
  </div>
</section>
{% endblock %}
